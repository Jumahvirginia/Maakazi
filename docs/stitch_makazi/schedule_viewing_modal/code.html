<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#048b7b",
                        "accent-burgundy": "#880a23",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0f2320",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Makazi - Schedule Viewing</title>
</head>
<body class="bg-slate-200 font-display text-slate-900">
<!-- Page Backdrop (Simulating Property Detail Page) -->
<div class="fixed inset-0 z-0 flex flex-col overflow-hidden">
<!-- Mock Header -->
<header class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center">
<div class="flex items-center gap-2">
<div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined text-xl">home_work</span>
</div>
<span class="text-xl font-extrabold tracking-tight text-primary">MAKAZI</span>
</div>
<nav class="flex gap-6 text-sm font-medium text-slate-600">
<span>Find a Home</span>
<span>List Property</span>
<span>About</span>
</nav>
</header>
<!-- Mock Content -->
<main class="flex-1 p-8 grid grid-cols-12 gap-8">
<div class="col-span-8 flex flex-col gap-6">
<div class="h-[400px] w-full bg-slate-300 rounded-xl overflow-hidden relative">
<img class="w-full h-full object-cover" data-alt="Modern luxury villa in Nairobi with garden" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA4pR_pWK8PxxEUZvZMeiJPlM6dk076M0XYxmGvVUEqdCvfrmRlTVcA1DcP6UvNAPD4L6YxdAHtWRz8fvZtIDJLMJpMM0N2UfYmmDJbn7RUcQe8WGfIiOqFIovtWyyRecho7SWX6wmbsM43U_pL8_PodqIkk2Mk3I8qa4-y_JiaD38MKsAJY4ngXCq8vr0tmtp9SA1W0GO5mZUukSz6yt0PL3vki5uMcEPC7z1YuHAoLuTYbbHCSTn5SXzLdsZeNdDbf_gowFbYnBE"/>
</div>
<div class="flex flex-col gap-2">
<h1 class="text-3xl font-bold">3 Bedroom Penthouse, Kilimani</h1>
<p class="text-slate-500 flex items-center gap-1">
<span class="material-symbols-outlined text-sm">location_on</span>
                        Nairobi, Kenya
                    </p>
</div>
</div>
<div class="col-span-4 bg-white p-6 rounded-xl border border-slate-200 h-fit shadow-sm">
<div class="text-2xl font-bold mb-4 text-accent-burgundy">KSh 120,000<span class="text-sm font-normal text-slate-500"> /month</span></div>
<button class="w-full bg-primary text-white py-4 rounded-lg font-bold">Schedule Visit</button>
</div>
</main>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-background-dark/60 backdrop-blur-sm p-4">
<!-- Modal Container -->
<div class="bg-white w-full max-w-[500px] rounded-xl shadow-2xl overflow-hidden flex flex-col">
<!-- Modal Header -->
<div class="p-6 border-b border-slate-100 flex justify-between items-start">
<div class="flex flex-col gap-1">
<h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">Schedule a Viewing</h2>
<p class="text-slate-500 text-sm">Select your preferred date and time to visit this property.</p>
</div>
<button class="text-slate-400 hover:text-slate-600">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Modal Content (Scrollable if needed) -->
<div class="flex-1 overflow-y-auto">
<!-- Date Picker Section -->
<div class="p-6">
<div class="flex items-center justify-between mb-4">
<button class="p-2 hover:bg-slate-100 rounded-full transition-colors">
<span class="material-symbols-outlined text-slate-700">chevron_left</span>
</button>
<p class="text-base font-bold text-slate-900">November 2024</p>
<button class="p-2 hover:bg-slate-100 rounded-full transition-colors">
<span class="material-symbols-outlined text-slate-700">chevron_right</span>
</button>
</div>
<div class="grid grid-cols-7 text-center mb-2">
<span class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Sun</span>
<span class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Mon</span>
<span class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Tue</span>
<span class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Wed</span>
<span class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Thu</span>
<span class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Fri</span>
<span class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Sat</span>
</div>
<div class="grid grid-cols-7 gap-1">
<!-- Empty slots for previous month -->
<div class="h-10"></div><div class="h-10"></div><div class="h-10"></div><div class="h-10"></div><div class="h-10"></div>
<!-- Current month days -->
<button class="h-10 flex items-center justify-center rounded-lg text-sm font-medium text-slate-800 hover:bg-slate-100">1</button>
<button class="h-10 flex items-center justify-center rounded-lg text-sm font-medium text-slate-800 hover:bg-slate-100">2</button>
<button class="h-10 flex items-center justify-center rounded-lg text-sm font-medium text-slate-800 hover:bg-slate-100">3</button>
<button class="h-10 flex items-center justify-center rounded-lg text-sm font-medium text-slate-800 hover:bg-slate-100">4</button>
<button class="h-10 flex items-center justify-center rounded-lg text-sm font-medium text-slate-800 hover:bg-slate-100">5</button>
<button class="h-10 flex items-center justify-center rounded-lg text-sm font-medium text-slate-800 hover:bg-slate-100">6</button>
<button class="h-10 flex items-center justify-center rounded-lg text-sm font-medium text-slate-800 hover:bg-slate-100">7</button>
<button class="h-10 flex items-center justify-center rounded-lg text-sm font-medium text-slate-800 hover:bg-slate-100">8</button>
<button class="h-10 flex items-center justify-center rounded-lg text-sm font-medium text-slate-800 hover:bg-slate-100">9</button>
<button class="h-10 flex items-center justify-center rounded-lg text-sm font-medium text-slate-800 hover:bg-slate-100">10</button>
<button class="h-10 flex items-center justify-center rounded-lg text-sm font-medium text-slate-800 hover:bg-slate-100">11</button>
<button class="h-10 flex items-center justify-center rounded-lg text-sm font-medium text-slate-800 hover:bg-slate-100">12</button>
<!-- Selected Date with Burgundy -->
<button class="h-10 flex items-center justify-center rounded-lg text-sm font-bold bg-accent-burgundy text-white shadow-md shadow-accent-burgundy/20">13</button>
<button class="h-10 flex items-center justify-center rounded-lg text-sm font-medium text-slate-800 hover:bg-slate-100">14</button>
<button class="h-10 flex items-center justify-center rounded-lg text-sm font-medium text-slate-800 hover:bg-slate-100">15</button>
<button class="h-10 flex items-center justify-center rounded-lg text-sm font-medium text-slate-800 hover:bg-slate-100">16</button>
<button class="h-10 flex items-center justify-center rounded-lg text-sm font-medium text-slate-800 hover:bg-slate-100">17</button>
<button class="h-10 flex items-center justify-center rounded-lg text-sm font-medium text-slate-800 hover:bg-slate-100">18</button>
<button class="h-10 flex items-center justify-center rounded-lg text-sm font-medium text-slate-800 hover:bg-slate-100">19</button>
<button class="h-10 flex items-center justify-center rounded-lg text-sm font-medium text-slate-800 hover:bg-slate-100">20</button>
<button class="h-10 flex items-center justify-center rounded-lg text-sm font-medium text-slate-800 hover:bg-slate-100">21</button>
<button class="h-10 flex items-center justify-center rounded-lg text-sm font-medium text-slate-800 hover:bg-slate-100">22</button>
<button class="h-10 flex items-center justify-center rounded-lg text-sm font-medium text-slate-800 hover:bg-slate-100">23</button>
<button class="h-10 flex items-center justify-center rounded-lg text-sm font-medium text-slate-800 hover:bg-slate-100">24</button>
</div>
</div>
<!-- Time Slot Section -->
<div class="px-6 pb-8">
<h3 class="text-sm font-bold text-slate-900 mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-lg">schedule</span>
                        Available Time Slots
                    </h3>
<div class="grid grid-cols-2 gap-3">
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-lg border-2 border-primary bg-primary/5 text-primary text-sm font-bold transition-all">
                            10:00 AM
                        </button>
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-lg border border-slate-200 text-slate-600 text-sm font-medium hover:border-primary hover:text-primary transition-all">
                            12:00 PM
                        </button>
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-lg border border-slate-200 text-slate-600 text-sm font-medium hover:border-primary hover:text-primary transition-all">
                            02:00 PM
                        </button>
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-lg border border-slate-200 text-slate-600 text-sm font-medium hover:border-primary hover:text-primary transition-all">
                            04:00 PM
                        </button>
</div>
</div>
</div>
<!-- Modal Footer -->
<div class="p-6 bg-slate-50 border-t border-slate-100 flex gap-3">
<button class="flex-1 px-4 py-3 rounded-lg bg-white border border-slate-200 text-slate-700 font-bold text-sm hover:bg-slate-100 transition-colors">
                    Cancel
                </button>
<button class="flex-[2] px-4 py-3 rounded-lg bg-primary text-white font-bold text-sm shadow-lg shadow-primary/20 hover:brightness-110 transition-all">
                    Request Viewing
                </button>
</div>
</div>
</div>
</body></html>
