<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Makazi - Signup and Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#048b7b",
                "burgundy": "#800020",
                "cream": "#FBF9F1",
                "background-light": "#f5f8f8",
                "background-dark": "#0f2320",
              },
              fontFamily: {
                "display": ["Manrope", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #FBF9F1;
        }
    </style>
</head>
<body class="bg-cream text-slate-900 font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 bg-white px-6 md:px-20 py-4">
<div class="flex items-center gap-3 text-burgundy">
<div class="size-8 flex items-center justify-center">
<span class="material-symbols-outlined text-3xl">home_pin</span>
</div>
<h2 class="text-burgundy text-2xl font-extrabold leading-tight tracking-tight">Makazi</h2>
</div>
<div class="flex flex-1 justify-end gap-8 items-center">
<nav class="hidden md:flex items-center gap-9">
<a class="text-slate-700 hover:text-primary text-sm font-semibold leading-normal transition-colors" href="#">Home</a>
<a class="text-slate-700 hover:text-primary text-sm font-semibold leading-normal transition-colors" href="#">About</a>
<a class="text-slate-700 hover:text-primary text-sm font-semibold leading-normal transition-colors" href="#">Contact</a>
</nav>
<div class="h-10 w-10 rounded-full border-2 border-primary/20 bg-slate-100 flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-slate-400">person</span>
</div>
</div>
</header>
<main class="flex-1 flex items-center justify-center p-6 sm:p-12">
<!-- Auth Card Container -->
<div class="w-full max-w-[480px] bg-white rounded-xl shadow-xl border border-slate-100 p-8">
<div class="text-center mb-8">
<h1 class="text-slate-900 text-3xl font-bold mb-2">Welcome to Makazi</h1>
<p class="text-slate-500 text-sm">Find your perfect home in Kenya</p>
</div>
<!-- User Type Toggle -->
<div class="flex p-1 bg-slate-100 rounded-lg mb-8">
<label class="flex-1 cursor-pointer">
<input checked="" class="peer sr-only" name="user_type" type="radio"/>
<div class="py-2.5 text-center text-sm font-bold rounded-lg transition-all peer-checked:bg-primary peer-checked:text-white text-slate-500">
                                Looking for a house
                            </div>
</label>
<label class="flex-1 cursor-pointer">
<input class="peer sr-only" name="user_type" type="radio"/>
<div class="py-2.5 text-center text-sm font-bold rounded-lg transition-all peer-checked:bg-primary peer-checked:text-white text-slate-500">
                                I am a Landlord
                            </div>
</label>
</div>
<!-- Form -->
<form class="space-y-5">
<div class="flex flex-col gap-1.5">
<label class="text-slate-700 text-sm font-bold">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
<input class="w-full pl-11 pr-4 py-3 rounded-lg border border-slate-200 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-slate-400 text-slate-900" placeholder="name@example.com" type="email"/>
</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-slate-700 text-sm font-bold">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
<input class="w-full pl-11 pr-4 py-3 rounded-lg border border-slate-200 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-slate-400 text-slate-900" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 rounded-lg transition-colors shadow-md shadow-primary/20" type="submit">
                            Create Account
                        </button>
</form>
<!-- Divider -->
<div class="relative my-8 text-center">
<div class="absolute inset-0 flex items-center">
<span class="w-full border-t border-slate-200"></span>
</div>
<span class="relative bg-white px-4 text-xs font-bold uppercase tracking-wider text-slate-400">Or continue with</span>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 border border-slate-200 hover:bg-slate-50 py-2.5 rounded-lg transition-colors text-slate-700 font-semibold text-sm">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                            Google
                        </button>
<button class="flex items-center justify-center gap-2 border border-slate-200 hover:bg-slate-50 py-2.5 rounded-lg transition-colors text-slate-700 font-semibold text-sm">
<span class="material-symbols-outlined text-slate-900">ios</span>
                            Apple
                        </button>
</div>
<!-- Footer Link -->
<div class="mt-8 text-center">
<p class="text-slate-500 text-sm">
                            Already have an account? 
                            <a class="text-primary hover:text-primary/80 font-bold ml-1 transition-colors" href="#">Log In</a>
</p>
</div>
</div>
</main>
<!-- Bottom Illustration/Brand Footer -->
<footer class="py-8 px-6 text-center">
<p class="text-slate-400 text-xs font-medium">© 2024 Makazi Real Estate Platform. All rights reserved.</p>
<div class="flex justify-center gap-4 mt-2">
<a class="text-slate-400 hover:text-burgundy text-xs" href="#">Terms of Service</a>
<a class="text-slate-400 hover:text-burgundy text-xs" href="#">Privacy Policy</a>
</div>
</footer>
</div>
</div>
</body></html>
